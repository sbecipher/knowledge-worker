services:
  marketflow-worker:
    container_name: marketflow-worker
    image: ${MARKETFLOW_WORKER_IMAGE:-sbecipher/marketflow-worker:latest}
    restart: unless-stopped
    network_mode: "host"
    environment:
      # Point the worker at the Temporal frontend (VM internal IP + gRPC port)
      TEMPORAL_ADDRESS: ${TEMPORAL_ADDRESS:-172.0.0.4:7233}
      TEMPORAL_TASK_QUEUE: ${TEMPORAL_TASK_QUEUE:-marketio-task-queue}

      # If Marketio is Cloud Run, use the HTTPS URL (NOT localhost)
      MARKETIO_API_URL: ${MARKETIO_API_URL:-https://marketio-875978034496.us-central1.run.app}

      GCS_BUCKET: ${GCS_BUCKET:-sbecipher-intelligence}
      GCS_PREFIX: ${GCS_PREFIX:-}
      INSTRUMENT: ${INSTRUMENT:-mm-h5r1}
      MODEL_VERSION: ${MODEL_VERSION:-metadata}
      TEMP_DIR: ${TEMP_DIR:-tmp}
      UPLOAD_ENABLED: ${UPLOAD_ENABLED:-true}
      CLEANUP_LOCAL_ARTIFACTS: ${CLEANUP_LOCAL_ARTIFACTS:-true}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ACTIVITY_EXECUTOR_THREADS: ${ACTIVITY_EXECUTOR_THREADS:-16}
      MAX_CONCURRENT_ACTIVITIES: ${MAX_CONCURRENT_ACTIVITIES:-16}
      MAX_CONCURRENT_WORKFLOW_TASKS: ${MAX_CONCURRENT_WORKFLOW_TASKS:-100}
      MAX_CACHED_WORKFLOWS: ${MAX_CACHED_WORKFLOWS:-1000}

      # Only needed if your worker exposes an HTTP server for health checks/metrics
      PORT: ${PORT:-8081}
